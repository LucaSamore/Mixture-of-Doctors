user nginx;
worker_processes auto;  # Automatically adjusts based on CPU cores

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # Basic optimizations
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    server {
        listen 80 default_server;
        server_name _;

        # Global health check endpoint
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"up","timestamp":"$time_iso8601"}';
        }
        
        # Orchestrator health check
        location = /orchestrator/health {
            proxy_pass http://orchestrator:8080/health;
            access_log off;
        }
        
        # Chat history health check
        location = /chat-history/health {
            proxy_pass http://chat-history:8000/health;
            access_log off;
        }
        
        # Chat history API routing
        location /chat-history/ {
            rewrite ^/chat-history/(.*)$ /$1 break;
            proxy_pass http://chat-history:8000;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Orchestrator routing (default path)
        location / {
            proxy_pass http://orchestrator:8080;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}