services:
  chat-history:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${CHAT_HISTORY_PORT}:${CHAT_HISTORY_PORT}"
    depends_on:
      - mongo1
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - MONGODB_DB=${MONGODB_DB}
    networks:
      - mongodb-network

  mongo-express:
    image: mongo-express:latest
    ports:
      - "${MONGO_UI_PORT}:${MONGO_UI_PORT}"
    environment:
      - ME_CONFIG_MONGODB_SERVER=${MONGO_PRIMARY_HOST}
      - ME_CONFIG_MONGODB_PORT=${MONGO1_PORT}
      - ME_CONFIG_MONGODB_URL=${MONGODB_URL}
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      - mongo1
    restart: unless-stopped
    networks:
      - mongodb-network

  mongo1:
    image: mongo:latest
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "${MONGO1_PORT}"]
    ports:
      - ${MONGO1_PORT}:${MONGO1_PORT}
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo1:${MONGO1_PORT}',priority:1},{_id:1,host:'mongo2:${MONGO2_PORT}',priority:0.5},{_id:2,host:'mongo3:${MONGO2_PORT}',priority:0.5}]}) }" | mongosh --port ${MONGO1_PORT} --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      retries: 30
    volumes:
      - "mongo1_data:/data/db"
    networks:
      - mongodb-network

  mongo2:
    image: mongo:latest
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "${MONGO2_PORT}"]
    ports:
      - ${MONGO2_PORT}:${MONGO2_PORT}
    healthcheck:
      test: echo "rs.status()" | mongosh --port ${MONGO2_PORT} --quiet
      interval: 5s
      timeout: 30s
      retries: 30
    volumes:
      - "mongo2_data:/data/db"
    networks:
      - mongodb-network

  mongo3:
    image: mongo:latest
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "${MONGO3_PORT}"]
    ports:
      - ${MONGO3_PORT}:${MONGO3_PORT}
    healthcheck:
      test: echo "rs.status()" | mongosh --port ${MONGO3_PORT} --quiet
      interval: 5s
      timeout: 30s
      retries: 30
    volumes:
      - "mongo3_data:/data/db"
    networks:
      - mongodb-network

networks:
  mongodb-network:
    driver: bridge

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data: