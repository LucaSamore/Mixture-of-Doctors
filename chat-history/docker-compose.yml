# Configurazione alternativa con Mongo Express invece di Mongoku
services:
  chat-history:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - mongo1
    environment:
      - MONGODB_URL=mongodb://mongo1:27017,mongo2:27018,mongo3:27019/chat-history?replicaSet=rs0
      - MONGODB_DB=chat-history
    networks:
      - mongodb-network

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo1
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_URL=mongodb://mongo1:27017,mongo2:27018,mongo3:27019/?replicaSet=rs0
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      - mongo1
    restart: unless-stopped
    networks:
      - mongodb-network

  mongo1:
    image: mongo:latest
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - 27017:27017
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo1:27017',priority:1},{_id:1,host:'mongo2:27018',priority:0.5},{_id:2,host:'mongo3:27019',priority:0.5}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      retries: 30
    volumes:
      - "mongo1_data:/data/db"
    networks:
      - mongodb-network

  mongo2:
    image: mongo:latest
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27018"]
    ports:
      - 27018:27018
    healthcheck:
      test: echo "rs.status()" | mongosh --port 27018 --quiet
      interval: 5s
      timeout: 30s
      retries: 30
    volumes:
      - "mongo2_data:/data/db"
    networks:
      - mongodb-network

  mongo3:
    image: mongo:latest
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27019"]
    ports:
      - 27019:27019
    healthcheck:
      test: echo "rs.status()" | mongosh --port 27019 --quiet
      interval: 5s
      timeout: 30s
      retries: 30
    volumes:
      - "mongo3_data:/data/db"
    networks:
      - mongodb-network

networks:
  mongodb-network:
    driver: bridge

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data: